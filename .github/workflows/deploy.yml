name: pages build and deployment

on:
  push:
    branches: ["main"] # Runs whenever you push code to main
  workflow_dispatch:   # Allows you to trigger it manually

# This block grants the exact permissions required by GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Avoids conflicting deployment runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads your entire root repository folder

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
